# Databricks Asset Bundle for "App + Lakebase in a Day".
#
# Packages the Streamlit Maintenance Cockpit (bundle/src/app) as a deployable app resource, so a
# workspace admin can push it to a workspace with one command instead of the hands-on Lab 3 flow:
#
#   databricks bundle validate -t dev -p <profile>
#   databricks bundle deploy   -t dev -p <profile>
#
# Everything else in the workshop is run from the labs (labs/), which contain the code inline —
# there are no separate notebooks to deploy. After deploying the app, bind it to your Lakebase
# database and grant its service principal (Lab 3, Steps 2–3, or the app's UI ▸ Resources).
bundle:
  name: app-lakebase-in-a-day

include:
  - resources/*.yml

variables:
  app_name:
    description: Name for the deployed app.
    default: lb-workshop-cockpit

targets:
  dev:
    mode: development
    default: true
