# Databricks App config — Streamlit shop-floor maintenance app.
#
# Auth model (Lakebase Autoscaling): the app is bound to the Lakebase database as a
# `postgres` resource (see Lab 3), which provisions a Postgres role for the app's service
# principal. db.py then mints a fresh short-lived OAuth token per connection via
# w.postgres.generate_database_credential(ENDPOINT_NAME) — Autoscaling tokens expire ~1h,
# so there is deliberately NO static PGPASSWORD here.
#
# PER-USER: each user creates their own Lakebase project (lakebase-ws-<slug>-N) in Lab 2, so
# ENDPOINT_NAME and PGHOST differ per user. Lab 3, Step 1 resolves your project and writes the
# three REPLACE_ME values below for you — you don't hand-edit them. PGDATABASE is always
# `databricks_postgres` (the default database, required for Change Data Feed). PGUSER is omitted
# so db.py falls back to DATABRICKS_CLIENT_ID (the app's own service-principal id) automatically.
command: ["streamlit", "run", "app.py", "--server.port", "8000", "--server.address", "0.0.0.0"]
env:
  - name: STREAMLIT_GATHER_USAGE_STATS
    value: "false"
  # projects/<your-project>/branches/production/endpoints/primary — filled in by Lab 3, Step 1.
  - name: ENDPOINT_NAME
    value: "REPLACE_ME"
  # Your project endpoint's host — filled in by Lab 3, Step 1.
  - name: PGHOST
    value: "REPLACE_ME"
  - name: PGDATABASE
    value: "databricks_postgres"
  # Schema holding the synced reference tables (machines, ...). They land in lakebase_<slug>,
  # not public. Leave blank to auto-detect (the app finds the non-public schema with `machines`),
  # or pin it explicitly, e.g. "lakebase_janedoe".
  - name: PGREFSCHEMA
    value: ""
  - name: PGPORT
    value: "5432"
  - name: PGSSLMODE
    value: "require"
  # PGUSER intentionally omitted — db.py uses the injected DATABRICKS_CLIENT_ID (this app's
  # service principal), so this file needs no per-app edits. To pin it, uncomment:
  # - name: PGUSER
  #   value: "<your-app-service-principal-client-id>"
