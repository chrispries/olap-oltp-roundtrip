# One job that stands up the whole workshop stack for the deploying user:
# generate data -> create Lakebase + synced tables -> deploy the app.
# Notebook tasks run on serverless (no cluster block). Each notebook derives per-user names
# from current_user, so running the job provisions a complete demo environment.
resources:
  jobs:
    app_lakebase_setup:
      name: "App + Lakebase in a Day — setup"
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ../src/notebooks/generate_data.py
        - task_key: create_lakebase
          depends_on:
            - task_key: generate_data
          notebook_task:
            notebook_path: ../src/notebooks/create_lakebase.py
        - task_key: deploy_app
          depends_on:
            - task_key: create_lakebase
          notebook_task:
            notebook_path: ../src/notebooks/deploy_app.py
